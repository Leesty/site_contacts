<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Открываем Telegram…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .spin {
      width: 48px;
      height: 48px;
      border: 3px solid #0088cc;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; color: #1a1a2e; }
    p { font-size: 15px; color: #555; margin: 8px 0; line-height: 1.5; }
    .fallback-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #0088cc, #0066aa);
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(0,136,204,0.3);
    }
    .fallback-btn:hover { box-shadow: 0 6px 20px rgba(0,136,204,0.5); }
  </style>
</head>
<body>
  <div class="spin"></div>
  <h1>Открываем Telegram…</h1>
  <p>Если Telegram не открылся автоматически — нажмите кнопку ниже:</p>
  <a class="fallback-btn" href="{{ tg_web_url }}" id="fallback-link">Открыть @{{ bot_username }}</a>

  <script>
  (function() {
    var tgApp = "{{ tg_app_uri|escapejs }}";
    var tgWeb = "{{ tg_web_url|escapejs }}";

    // Основная попытка — нативный tg:// (приложение подхватит start-param гарантированно)
    try {
      window.location.href = tgApp;
    } catch (e) { /* ignore */ }

    // Фолбэк на https://t.me/ через 1.8 сек, если приложение не открылось.
    // Если открылось — visibilitychange сработает раньше и мы отменим фолбэк.
    var fallback = setTimeout(function() {
      window.location.href = tgWeb;
    }, 1800);

    document.addEventListener("visibilitychange", function() {
      if (document.hidden) {
        // Пользователь ушёл из браузера (скорее всего в Telegram) — отменяем фолбэк
        clearTimeout(fallback);
      }
    });
  })();
  </script>
</body>
</html>
