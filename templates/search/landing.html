<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ lead_name }}, у нас есть для вас клиент!</title>
  <meta property="og:title" content="{{ lead_name }}, у нас есть для вас клиент!">
  <meta property="og:description" content="Запустите бота чтобы получить первого клиента за процент с продаж 🔥">
  <meta property="og:type" content="website">
  <meta name="description" content="Запустите бота чтобы получить первого клиента за процент с продаж">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #fff;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .emoji-top {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      color: #1a1a2e;
      line-height: 1.3;
      margin-bottom: 16px;
    }
    .subtitle {
      font-size: 15px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .tg-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #0088cc, #0066aa);
      color: #fff;
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
      padding: 16px 32px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 15px rgba(0,136,204,0.4);
      width: 100%;
    }
    .tg-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,136,204,0.5);
    }
    .tg-btn:active {
      transform: translateY(0);
    }
    .tg-btn svg {
      width: 22px;
      height: 22px;
      fill: #fff;
      flex-shrink: 0;
    }
    .footer-note {
      margin-top: 24px;
      font-size: 13px;
      color: #888;
    }
    @media (max-width: 480px) {
      .card { padding: 36px 24px; border-radius: 20px; }
      h1 { font-size: 21px; }
      .tg-btn { font-size: 16px; padding: 14px 24px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji-top">🔥</div>
    <h1>{{ lead_name }}, даём клиентов за процент с продаж!</h1>
    <p class="subtitle">
      Запустите бота по кнопке ниже чтобы получить первого клиента за процент.<br><br>
      После запуска в ближайшее время вам ответит менеджер 👍
    </p>
    <a class="tg-btn" href="/s/{{ code }}/go/" target="_blank">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M11.944 0A12 12 0 1 0 24 12.056A12.013 12.013 0 0 0 11.944 0Zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472c-.18 1.898-.962 6.502-1.36 8.627c-.168.9-.499 1.201-.82 1.23c-.696.065-1.225-.46-1.9-.902c-1.056-.693-1.653-1.124-2.678-1.8c-1.185-.78-.417-1.21.258-1.91c.177-.184 3.247-2.977 3.307-3.23c.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345c-.48.33-.913.49-1.302.48c-.428-.008-1.252-.241-1.865-.44c-.752-.245-1.349-.374-1.297-.789c.027-.216.325-.437.893-.663c3.498-1.524 5.83-2.529 6.998-3.014c3.332-1.386 4.025-1.627 4.476-1.635Z"/></svg>
      Получить первого клиента
    </a>
    <p class="footer-note">Берем 10% от чистой прибыли</p>
  </div>
</body>
</html>
