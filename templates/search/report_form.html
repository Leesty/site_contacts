{% extends "base.html" %}

{% block title %}Отчёт — {{ link.lead_name }}{% endblock %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0">Отчёт: {{ link.lead_name }}</h1>
    <a class="btn btn-outline-secondary btn-sm" href="{% url 'search_links_my' %}">← Мои ссылки</a>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label" for="lead_date">Дата лида</label>
              <input type="date" class="form-control" id="lead_date" name="lead_date" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="attachment">Скриншот / видео</label>
              <input type="file" class="form-control" id="attachment" name="attachment" accept="image/*,video/*" required>
              <div class="form-text text-muted">Запись экрана или скриншот подтверждения.</div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="comment">Комментарий (необязательно)</label>
              <textarea class="form-control" id="comment" name="comment" rows="2"></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Отправить отчёт</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
