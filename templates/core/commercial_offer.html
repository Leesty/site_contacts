<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Коммерческое предложение — Партнёрка</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #ffffff;
      color: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100%;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 20px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-align: center;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 15px;
      color: #6b7280;
      text-align: center;
      margin-bottom: 28px;
    }
    .player-card {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
      background: #000;
    }
    video {
      display: block;
      width: 100%;
      height: auto;
      max-height: 80vh;
      background: #000;
    }
    .footer {
      margin-top: 28px;
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
    }
    @media (max-width: 600px) {
      .title { font-size: 21px; }
      .wrap { padding: 24px 14px 40px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">Коммерческое предложение</h1>
    <p class="subtitle">Партнёрка — посмотрите короткое видео ниже</p>

    <div class="player-card">
      <video controls preload="metadata" playsinline>
        <source src="https://s3.twcstorage.ru/06dcf8ea-173b-4c64-bfdf-bee5297b1c71/site/commercial_offer.mp4" type="video/mp4">
        Ваш браузер не поддерживает воспроизведение видео.
      </video>
    </div>

    <p class="footer">rupartnerka.ru</p>
  </div>
</body>
</html>
