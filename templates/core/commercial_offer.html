<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Коммерческое предложение</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #ffffff;
      min-height: 100%;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }
    .player-card {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
      background: #000;
    }
    video {
      display: block;
      width: 100%;
      height: auto;
      max-height: 88vh;
      background: #000;
    }
    @media (max-width: 600px) {
      .wrap { padding: 16px 12px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="player-card">
      <video controls preload="metadata" playsinline>
        <source src="https://s3.twcstorage.ru/06dcf8ea-173b-4c64-bfdf-bee5297b1c71/site/commercial_offer.mp4" type="video/mp4">
        Ваш браузер не поддерживает воспроизведение видео.
      </video>
    </div>
  </div>
</body>
</html>
